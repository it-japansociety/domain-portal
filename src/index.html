<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Code Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0a1628;
      --blue:        #0f62fe;
      --blue-hover:  #0353e9;
      --success:     #24a148;
      --success-bg:  #defbe6;
      --error:       #da1e28;
      --error-bg:    #fff1f1;
      --text-primary:   #161616;
      --text-secondary: #525252;
      --text-muted:     #8d8d8d;
      --border:         #e0e0e0;
      --surface:        #ffffff;
      --bg:             #f4f4f4;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .portal-container {
      width: 100%;
      max-width: 480px;
    }

    /* ── Screen management ───────────────────────── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Hero ────────────────────────────────────── */
    .portal-hero {
      margin-bottom: 2rem;
      text-align: center;
    }

    .portal-logo {
      width: 48px;
      height: 48px;
      background: var(--navy);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .portal-logo svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    .portal-heading {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }

    .portal-subtext {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ── Card ────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    /* ── Form ────────────────────────────────────── */
    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.375rem;
    }

    .field-hint {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    input[type="email"] {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      font-family: var(--font-sans);
      font-size: 0.9375rem;
      color: var(--text-primary);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 2px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="email"]::placeholder { color: #a8a8a8; }

    input[type="email"]:focus {
      border-color: var(--blue);
      box-shadow: inset 0 0 0 1px var(--blue);
    }

    input[type="email"].error {
      border-color: var(--error);
      box-shadow: inset 0 0 0 1px var(--error);
    }

    /* ── Button ──────────────────────────────────── */
    .btn-primary {
      width: 100%;
      height: 48px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 2px;
      font-family: var(--font-sans);
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s ease;
    }

    .btn-primary:hover:not(:disabled) { background: var(--blue-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Spinner ─────────────────────────────────── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Field error ─────────────────────────────── */
    .field-error {
      font-size: 0.75rem;
      color: var(--error);
      margin-top: 0.375rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── Result screen ───────────────────────────── */
    .result-success {
      text-align: center;
      padding: 0.5rem 0;
    }

    .result-check {
      width: 56px;
      height: 56px;
      background: var(--success-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .result-check svg {
      width: 28px;
      height: 28px;
      stroke: var(--success);
    }

    .result-heading {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 0.375rem;
    }

    .result-domain-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .code-box {
      background: #f4f4f4;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .code-label {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .code-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .code-value {
      font-family: var(--font-mono);
      font-size: 1.375rem;
      font-weight: 500;
      color: var(--navy);
      letter-spacing: 0.06em;
      flex: 1;
      word-break: break-all;
    }

    .btn-copy {
      height: 40px;
      padding: 0 14px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 2px;
      font-family: var(--font-sans);
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-copy:hover { background: #1b3460; }
    .btn-copy.copied { background: var(--success); }

    .result-note {
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ── Error screen ────────────────────────────── */
    .result-error-screen {
      text-align: center;
      padding: 0.5rem 0;
    }

    .error-icon {
      width: 56px;
      height: 56px;
      background: var(--error-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .error-icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--error);
    }

    .error-heading {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }

    .error-msg {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ── Footer ──────────────────────────────────── */
    .portal-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    @media (max-width: 520px) {
      .card { padding: 1.5rem 1.25rem; }
      .portal-heading { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="portal-container">

    <!-- ── Screen 1: Email entry ───────────────── -->
    <div class="screen active" id="screen-entry">
      <div class="portal-hero">
        <h1 class="portal-heading">Retrieve Your Access Code</h1>
        <p class="portal-subtext">Enter your work email address and we'll retrieve your organization's assigned access code.</p>
      </div>

      <div class="card">
        <div class="field">
          <label for="email-input">Work Email Address</label>
          <input
            type="email"
            id="email-input"
            placeholder="you@yourcompany.com"
            autocomplete="email"
            autocapitalize="none"
            spellcheck="false"
          />
          <div class="field-error" id="input-error" style="display:none">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            <span id="input-error-text"></span>
          </div>
        </div>

        <button class="btn-primary" id="lookup-btn" onclick="handleLookup()">
          <span id="btn-text">Get My Access Code</span>
          <span id="btn-spinner" class="spinner" style="display:none"></span>
        </button>
      </div>

      <div class="portal-footer"></div>
    </div>

    <!-- ── Screen 2: Success ───────────────────── -->
    <div class="screen" id="screen-success">
      <div class="card">
        <div class="result-success">
          <div class="result-check">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
            </svg>
          </div>
          <div class="result-heading">Access Code Found</div>
          <div class="result-domain-label" id="result-domain-text"></div>

          <div class="code-box">
            <div class="code-label">Your Access Code</div>
            <div class="code-row">
              <div class="code-value" id="result-code"></div>
              <button class="btn-copy" id="copy-btn" onclick="copyCode()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                <span id="copy-text">Copy</span>
              </button>
            </div>
          </div>

          <p class="result-note">Please save this code.</p>
        </div>
      </div>
    </div>

    <!-- ── Screen 3: Not found ─────────────────── -->
    <div class="screen" id="screen-error">
      <div class="card">
        <div class="result-error-screen">
          <div class="error-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </div>
          <div class="error-heading">No Code Found</div>
          <p class="error-msg" id="error-message"></p>
        </div>
      </div>
      <div class="portal-footer"></div>
    </div>

  </div>
</div>

<script>
  const API_ENDPOINT = "/api/lookup";

  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  async function handleLookup() {
    const input = document.getElementById("email-input");
    const raw = input.value.trim();

    hideError();

    // Basic email validation
    if (!raw || !raw.includes("@")) {
      showError("Please enter a valid work email address.");
      input.classList.add("error");
      input.focus();
      return;
    }

    const parts = raw.split("@");
    const domain = parts[1]?.toLowerCase().trim();

    if (!domain || !domain.includes(".")) {
      showError("Please enter a valid work email address.");
      input.classList.add("error");
      input.focus();
      return;
    }

    setLoading(true);

    try {
      // Get a short-lived token first
      const tkRes = await fetch("/api/token");
      const tk = await tkRes.json();

      const res = await fetch(`${API_ENDPOINT}?domain=${encodeURIComponent(domain)}&t=${tk.t}&s=${tk.s}`);
      const data = await res.json();

      if (res.ok && data.code) {
        document.getElementById("result-domain-text").textContent = domain;
        document.getElementById("result-code").textContent = data.code;
        showScreen("screen-success");
      } else {
        document.getElementById("error-message").textContent =
          "Your organization does not have a code registered under this email domain.";
        showScreen("screen-error");
      }
    } catch (err) {
      document.getElementById("error-message").textContent =
        "Unable to reach the lookup service. Please check your connection and try again.";
      showScreen("screen-error");
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    const btn = document.getElementById("lookup-btn");
    document.getElementById("btn-text").style.display = on ? "none" : "inline";
    document.getElementById("btn-spinner").style.display = on ? "block" : "none";
    btn.disabled = on;
  }

  function showError(msg) {
    const err = document.getElementById("input-error");
    document.getElementById("input-error-text").textContent = msg;
    err.style.display = "flex";
  }

  function hideError() {
    document.getElementById("input-error").style.display = "none";
    document.getElementById("email-input").classList.remove("error");
  }

  async function copyCode() {
    const code = document.getElementById("result-code").textContent;
    try {
      await navigator.clipboard.writeText(code);
      const btn = document.getElementById("copy-btn");
      btn.classList.add("copied");
      document.getElementById("copy-text").textContent = "Copied!";
      setTimeout(() => {
        btn.classList.remove("copied");
        document.getElementById("copy-text").textContent = "Copy";
      }, 2500);
    } catch {
      const el = document.getElementById("result-code");
      const range = document.createRange();
      range.selectNode(el);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    }
  }

  document.getElementById("email-input").addEventListener("keydown", e => {
    if (e.key === "Enter") handleLookup();
  });

  document.getElementById("email-input").addEventListener("input", hideError);
</script>
</body>
</html>
